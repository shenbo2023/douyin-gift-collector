syntax = "proto3";

package douyin;

message Header {
  string key = 1;
  string value = 2;
}

message PushFrame {
  uint64 seqId = 1;
  uint64 logId = 2;
  uint64 service = 3;
  uint64 method = 4;
  repeated Header headersList = 5;
  string payloadEncoding = 6;
  string payloadType = 7;
  bytes payload = 8;
}

message Response {
  repeated Message messagesList = 1;
  string cursor = 2;
  uint64 fetchInterval = 3;
  uint64 now = 4;
  string internalExt = 5;
  uint32 fetchType = 6;
  uint64 heartbeatDuration = 8;
  bool needAck = 9;
  string pushServer = 10;
}

message Message {
  string method = 1;
  bytes payload = 2;
  int64 msgId = 3;
  int32 msgType = 4;
}

message PayGrade {
  uint32 level = 3;
}

message Common {
  string method = 1;
  uint64 msgId = 2;
  uint64 roomId = 3;
  uint64 createTime = 4;
  string describe = 7;
  User user = 15;
}

message TextPieceUser {
  User user = 1;
}

message TextPiece {
  string stringValue = 3;
  TextPieceUser userValue = 4;
}

message Text {
  repeated TextPiece piecesList = 4;
}

// 与 exe 内嵌 protobuf 标签一致: nickname=3, gender=4, pay_grade=22, display_id=38
message User {
  uint64 id = 1;
  uint64 shortId = 2;
  string nickName = 3;
  uint32 gender = 4;
  PayGrade payGrade = 22;
  string displayId = 38;
  string idStr = 1028;
}

// GiftStruct: id=5, describe=2, diamondCount=12, name=16
message GiftStruct {
  string describe = 2;
  uint64 id = 5;
  uint32 diamondCount = 12;
  string name = 16;
}

// GiftMessage: user=7, gift=15; repeatEnd=9; totalCount=29
message GiftMessage {
  Common common = 1;
  uint64 giftId = 2;
  uint64 fanTicketCount = 3;
  uint64 groupCount = 4;
  uint64 repeatCount = 5;
  uint64 comboCount = 6;
  User user = 7;
  uint32 repeatEnd = 9;
  uint64 groupId = 11;
  GiftStruct gift = 15;
  uint64 totalCount = 29;
}

message MemberMessage {
  Common common = 1;
  User user = 2;
  uint64 memberCount = 3;
  uint64 action = 10;
}

message ChatMessage {
  Common common = 1;
  User user = 2;
  string content = 3;
  Text rtfContent = 22;
}

message SocialMessage {
  Common common = 1;
  User user = 2;
  uint64 action = 4;
  uint64 followCount = 6;
}

// WebcastRoomMessage: 系统通知/团播卡片，不是礼物（此前误解析为「直播间状态更新」）
message RoomMessage {
  Common common = 1;
  string content = 2;
  string bizScene = 20;
}

message RoomInfo {
  int64 status = 1;
  string title = 2;
  int64 userCount = 3;
}

// WebcastBindingGiftMessage: 内含完整 GiftMessage
message BindingGiftMessage {
  GiftMessage msg = 1;
}

// WebcastLightGiftMessage: 网页端轻量礼物
message LightGiftMessage {
  Common common = 1;
  uint64 groupCount = 2;
  uint64 repeatCount = 3;
  uint64 comboCount = 4;
  uint64 count = 10;
  GiftStruct gift = 13;
}

// WebcastUpdateFanTicketMessage: 礼物贡献值变化
message UpdateFanTicketMessage {
  Common common = 1;
  uint64 roomFanTicketCount = 3;
}

// 团播礼物相关（非 WebcastGiftMessage，但可辅助判断）
message GroupLiveGiftRecipientRecommendMessage {
  Common common = 1;
  uint64 recipientUserId = 2;
}
